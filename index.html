<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>JARVIS ESTABLE HUD</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap');

body{
    margin:0;
    background: radial-gradient(circle at center, #020814, #000);
    font-family:'Orbitron', sans-serif;
    color:#00f7ff;
    overflow:hidden;
}

/* fondo HUD */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
        radial-gradient(circle at 20% 30%, rgba(0,255,255,0.06), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0,150,255,0.06), transparent 40%);
}

/* centro */
#container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

/* núcleo */
#core{
    width:260px;
    height:260px;
    border-radius:50%;
    background: radial-gradient(circle at 30% 30%, #00ffff, #001018 70%);
    box-shadow:
        0 0 30px #00f7ff,
        0 0 120px rgba(0,255,255,0.4);
    animation:pulse 2.2s infinite ease-in-out;
}

@keyframes pulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.06); }
}

/* texto */
#text{
    margin-top:20px;
    font-size:18px;
    letter-spacing:2px;
}

#status{
    font-size:12px;
    opacity:0.6;
    margin-top:8px;
}
</style>
</head>

<body>

<div id="container">
    <div id="core"></div>
    <div id="text">Iniciando JARVIS...</div>
    <div id="status">BOOTING</div>
</div>

<script>

const text = document.getElementById("text");
const status = document.getElementById("status");

let recognition;
let speaking = false;

// 🗣️ VOZ
function hablar(t){

    if(speaking) return;
    speaking = true;

    const msg = new SpeechSynthesisUtterance(t);
    msg.lang = "es-ES";
    msg.rate = 0.95;
    msg.pitch = 1.3;

    let voices = speechSynthesis.getVoices();
    let voice = voices.find(v => v.lang.includes("es"));

    if(voice) msg.voice = voice;

    msg.onend = () => speaking = false;

    speechSynthesis.speak(msg);
}

// 🎤 MICRÓFONO ESTABLE (FIX)
function iniciarVoz(){

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if(!SpeechRecognition){
        alert("Tu navegador no soporta voz");
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = "es-ES";
    recognition.continuous = true;
    recognition.interimResults = false;

    recognition.onstart = () => {
        status.innerHTML = "LISTENING...";
    };

    recognition.onerror = (e) => {
        console.log("Error:", e.error);
        status.innerHTML = "RESTARTING VOICE...";
        setTimeout(()=> recognition.start(), 2000);
    };

    recognition.onend = () => {
        // 🔥 REINICIO AUTOMÁTICO
        recognition.start();
    };

    recognition.onresult = (e) => {

        let cmd = e.results[e.results.length - 1][0].transcript.toLowerCase();

        text.innerHTML = ">> " + cmd;

        ejecutar(cmd);
    };

    recognition.start();
}

// 🧠 CEREBRO BÁSICO
function ejecutar(cmd){

    if(cmd.includes("hola")){
        hablar("Hola, estoy activo");
    }

    else if(cmd.includes("hora")){
        hablar("Son las " + new Date().toLocaleTimeString());
    }

    else if(cmd.includes("youtube")){
        hablar("Abriendo YouTube");
        window.open("https://youtube.com");
    }

    else if(cmd.includes("google")){
        hablar("Abriendo Google");
        window.open("https://google.com");
    }

    else if(cmd.includes("modo alerta")){
        document.body.style.background = "#200";
        status.innerHTML = "ALERT MODE";
        hablar("Modo alerta activado");
    }

    else{
        hablar("No entendí el comando");
    }
}

// 🚀 INICIO
window.onload = () => {

    setTimeout(()=>{
        hablar("Sistema JARVIS activado");
        iniciarVoz();
        status.innerHTML = "ONLINE";
    },2000);
};

</script>

</body>
</html>
