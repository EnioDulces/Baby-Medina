<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>JARVIS AUTO START</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap');

body{
    margin:0;
    background: radial-gradient(circle at center, #02040a, #000);
    color:#00f7ff;
    font-family:'Orbitron', sans-serif;
    overflow:hidden;
}

/* fondo HUD */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
        radial-gradient(circle at 25% 30%, rgba(0,255,255,0.08), transparent 40%),
        radial-gradient(circle at 75% 70%, rgba(0,150,255,0.08), transparent 40%);
}

/* centro */
#container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

/* núcleo */
#core{
    width:240px;
    height:240px;
    border-radius:50%;
    background: radial-gradient(circle, #00f7ff, #001018 70%);
    box-shadow:0 0 80px #00f7ff;
    animation:pulse 2.2s infinite ease-in-out;
}

/* pulso */
@keyframes pulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.06); }
}

#text{
    margin-top:20px;
    font-size:18px;
    letter-spacing:2px;
}
</style>
</head>

<body>

<div id="container">
    <div id="core"></div>
    <div id="text">Iniciando JARVIS...</div>
</div>

<script>

const text = document.getElementById("text");

let recognition;
let speaking = false;

// 🔊 VOZ
function hablar(t){

    if(speaking) return;
    speaking = true;

    const msg = new SpeechSynthesisUtterance(t);
    msg.lang = "es-ES";
    msg.rate = 0.95;
    msg.pitch = 1.35;

    let voices = speechSynthesis.getVoices();
    let voice = voices.find(v => v.lang.includes("es"));

    if(voice) msg.voice = voice;

    msg.onend = () => speaking = false;

    speechSynthesis.speak(msg);
}

// 🌅 SALUDO AUTOMÁTICO
function saludo(){

    const h = new Date().getHours();

    if(h >= 6 && h < 12){
        return "Buenos días";
    }
    else if(h >= 12 && h < 19){
        return "Buenas tardes";
    }
    else{
        return "Buenas noches";
    }
}

// 🎤 MICRÓFONO AUTOMÁTICO
function iniciarVoz(){

    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "es-ES";
    recognition.continuous = true;

    recognition.onresult = (event)=>{

        let cmd = event.results[event.results.length-1][0].transcript.toLowerCase();

        text.innerHTML = ">> " + cmd;

        ejecutar(cmd);
    };

    recognition.start();
}

// ⚡ COMANDOS
function ejecutar(cmd){

    if(cmd.includes("hora")){
        let h = new Date().toLocaleTimeString();
        hablar("Son las " + h);
    }

    else if(cmd.includes("hola")){
        hablar("Hola, estoy aquí");
    }

    else if(cmd.includes("youtube")){
        hablar("Abriendo YouTube");
        window.open("https://youtube.com");
    }

    else if(cmd.includes("google")){
        hablar("Abriendo Google");
        window.open("https://google.com");
    }

    else if(cmd.includes("modo alerta")){
        document.body.style.background = "#200";
        document.getElementById("core").style.boxShadow = "0 0 100px red";
        hablar("Modo alerta activado");
    }

    else if(cmd.includes("modo normal")){
        document.body.style.background = "black";
        document.getElementById("core").style.boxShadow = "0 0 80px #00f7ff";
        hablar("Modo normal restaurado");
    }

    else if(cmd.includes("quien eres")){
        hablar("Soy JARVIS, tu asistente inteligente");
    }

    else{
        hablar("No entendí el comando");
    }
}

// 🚀 AUTO INICIO TOTAL
window.onload = async () => {

    text.innerHTML = "JARVIS iniciando...";

    // saludo automático
    const msg = saludo() + ", sistema activado";
    hablar(msg);

    // activar micrófono automáticamente
    setTimeout(() => {
        iniciarVoz();
        text.innerHTML = "Escuchando...";
    }, 2500);
};

</script>

</body>
</html>
