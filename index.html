<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>JARVIS ESTABLE FIXED</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap');

body{
    margin:0;
    background: radial-gradient(circle at center, #020814, #000);
    font-family:'Orbitron', sans-serif;
    color:#00f7ff;
    overflow:hidden;
}

/* HUD */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
        radial-gradient(circle at 20% 30%, rgba(0,255,255,0.06), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0,150,255,0.06), transparent 40%);
}

/* centro */
#container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

/* núcleo */
#core{
    width:260px;
    height:260px;
    border-radius:50%;
    background: radial-gradient(circle at 30% 30%, #00ffff, #001018 70%);
    box-shadow:0 0 30px #00f7ff, 0 0 120px rgba(0,255,255,0.4);
    animation:pulse 2.2s infinite ease-in-out;
}

@keyframes pulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.06); }
}

#text{
    margin-top:20px;
    font-size:18px;
}

#status{
    font-size:12px;
    opacity:0.6;
    margin-top:8px;
}
</style>
</head>

<body>

<div id="container">
    <div id="core"></div>
    <div id="text">Iniciando JARVIS...</div>
    <div id="status">BOOTING</div>
</div>

<script>

const text = document.getElementById("text");
const status = document.getElementById("status");

let recognition;
let speaking = false;
let started = false;

/* 🔊 VOZ */
function hablar(t){

    if(speaking) return;
    speaking = true;

    const msg = new SpeechSynthesisUtterance(t);
    msg.lang = "es-ES";
    msg.rate = 0.95;
    msg.pitch = 1.2;

    msg.onend = () => speaking = false;

    speechSynthesis.speak(msg);
}

/* 🎤 MICRÓFONO 100% ESTABLE */
function iniciarVoz(){

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if(!SpeechRecognition){
        alert("Tu navegador no soporta voz");
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = "es-ES";
    recognition.continuous = true;
    recognition.interimResults = false;

    recognition.onstart = () => {
        status.innerHTML = "🎤 ESCUCHANDO...";
        console.log("MIC ACTIVO");
    };

    recognition.onerror = (e) => {
        console.log("ERROR:", e.error);
        status.innerHTML = "🔁 REINICIANDO...";

        setTimeout(() => {
            try { recognition.start(); } catch {}
        }, 1500);
    };

    recognition.onend = () => {
        // 🔥 REINICIO SEGURO
        setTimeout(() => {
            try { recognition.start(); } catch {}
        }, 400);
    };

    recognition.onresult = (e) => {

        let cmd = e.results[e.results.length - 1][0].transcript.toLowerCase();

        text.innerHTML = ">> " + cmd;

        ejecutar(cmd);
    };

    // 🔥 IMPORTANTE: solo arranca después de interacción
    setTimeout(() => {
        recognition.start();
    }, 800);
}

/* 🧠 CEREBRO */
function ejecutar(cmd){

    if(cmd.includes("hola")){
        hablar("Hola, estoy activo");
    }

    else if(cmd.includes("hora")){
        hablar("Son las " + new Date().toLocaleTimeString());
    }

    else if(cmd.includes("youtube")){
        window.open("https://youtube.com");
        hablar("Abriendo YouTube");
    }

    else if(cmd.includes("google")){
        window.open("https://google.com");
        hablar("Abriendo Google");
    }

    else if(cmd.includes("quien eres")){
        hablar("Soy JARVIS, tu asistente inteligente");
    }

    else if(cmd.includes("como estas")){
        hablar("Estoy funcionando correctamente");
    }

    else if(cmd.includes("modo alerta")){
        document.body.style.background = "#200";
        status.innerHTML = "ALERTA";
        hablar("Modo alerta activado");
    }

    else{
        hablar("No entendí el comando");
    }
}

/* 🚀 ARRANQUE SEGURO */
window.onload = () => {

    hablar("Sistema JARVIS iniciado");

    status.innerHTML = "ONLINE";

    // 🔥 clave para Chrome
    document.body.addEventListener("click", () => {
        if(!started){
            started = true;
            iniciarVoz();
        }
    });

};

</script>

</body>
</html>
