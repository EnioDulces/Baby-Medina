<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>JARVIS ULTRA PRO MAX</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap');

body{
    margin:0;
    background: radial-gradient(circle at center, #02040a, #000);
    color:#00f7ff;
    font-family:'Orbitron', sans-serif;
    overflow:hidden;
}

/* HUD BACKGROUND */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
        radial-gradient(circle at 25% 30%, rgba(0,255,255,0.08), transparent 40%),
        radial-gradient(circle at 75% 70%, rgba(0,150,255,0.08), transparent 40%);
    animation:move 12s infinite alternate ease-in-out;
}

@keyframes move{
    from{ transform:scale(1); }
    to{ transform:scale(1.15); }
}

/* CONTAINER */
#container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

/* CORE */
#core{
    width:240px;
    height:240px;
    border-radius:50%;
    background: radial-gradient(circle, #00f7ff, #001018 70%);
    box-shadow:
        0 0 25px #00f7ff,
        0 0 90px rgba(0,255,255,0.5),
        inset 0 0 40px rgba(255,255,255,0.1);
    position:relative;
    animation:pulse 2.2s infinite ease-in-out;
}

/* RINGS */
#core::before,
#core::after{
    content:"";
    position:absolute;
    border-radius:50%;
    border:1px solid rgba(0,255,255,0.25);
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

#core::before{
    width:300px;
    height:300px;
    animation:spin 10s linear infinite;
}

#core::after{
    width:360px;
    height:360px;
    animation:spinReverse 14s linear infinite;
}

/* ANIMATIONS */
@keyframes pulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.06); }
}

@keyframes spin{
    from{ transform:translate(-50%,-50%) rotate(0deg); }
    to{ transform:translate(-50%,-50%) rotate(360deg); }
}

@keyframes spinReverse{
    from{ transform:translate(-50%,-50%) rotate(360deg); }
    to{ transform:translate(-50%,-50%) rotate(0deg); }
}

/* TEXT */
#text{
    margin-top:20px;
    font-size:18px;
    letter-spacing:2px;
    opacity:0.9;
}

/* BUTTONS */
button{
    margin-top:15px;
    padding:10px 16px;
    border-radius:8px;
    border:1px solid #00f7ff;
    background:transparent;
    color:#00f7ff;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#00f7ff;
    color:black;
    box-shadow:0 0 20px #00f7ff;
}
</style>
</head>

<body>

<div id="container">

    <div id="core"></div>

    <div id="text">JARVIS ULTRA PRO MAX listo...</div>

    <button onclick="start()">🎤 Activar JARVIS</button>
    <button onclick="hablar('Sistema activo y estable')">🔊 Test voz</button>

</div>

<script>

const text = document.getElementById("text");

let recognition;
let speaking = false;

// 🧠 MEMORIA SIMPLE
let userKnown = false;
let userName = "usuario";

// 🔊 VOZ INTELIGENTE
function hablar(t){

    if(speaking) return;

    speaking = true;

    const msg = new SpeechSynthesisUtterance(t);
    msg.lang = "es-ES";
    msg.rate = 0.95;
    msg.pitch = 1.35;

    let voices = speechSynthesis.getVoices();
    let voice = voices.find(v => v.lang.includes("es"));

    if(voice) msg.voice = voice;

    msg.onend = () => {
        speaking = false;
    };

    speechSynthesis.speak(msg);
}

// 🎤 ACTIVAR VOZ
function start(){

    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "es-ES";
    recognition.continuous = true;

    recognition.onresult = (event)=>{

        let cmd = event.results[event.results.length-1][0].transcript.toLowerCase();

        text.innerHTML = ">> " + cmd;

        ejecutar(cmd);
    };

    recognition.start();

    hablar("JARVIS Ultra Pro Max activado");
}

// ⚡ MOTOR DE IA
function ejecutar(cmd){

    // 🧠 MEMORIA SIMPLE
    if(cmd.includes("mi nombre es")){
        userName = cmd.split("mi nombre es")[1].trim();
        userKnown = true;
        hablar("Encantado de conocerte " + userName);
        return;
    }

    if(cmd.includes("quien soy")){
        hablar(userKnown ? "Eres " + userName : "Aún no me has dicho tu nombre");
        return;
    }

    if(cmd.includes("hola")){
        hablar("Hola " + (userKnown ? userName : "usuario"));
    }

    else if(cmd.includes("hora")){
        let h = new Date().toLocaleTimeString();
        hablar("Son las " + h);
    }

    else if(cmd.includes("youtube")){
        hablar("Abriendo YouTube");
        window.open("https://youtube.com");
    }

    else if(cmd.includes("google")){
        hablar("Abriendo Google");
        window.open("https://google.com");
    }

    else if(cmd.includes("modo alerta")){
        document.body.style.background = "#200";
        document.getElementById("core").style.boxShadow = "0 0 80px red";
        hablar("Modo alerta activado");
    }

    else if(cmd.includes("modo normal")){
        document.body.style.background = "black";
        document.getElementById("core").style.boxShadow = "0 0 40px #00f7ff";
        hablar("Modo normal restaurado");
    }

    else if(cmd.includes("ayuda")){
        hablar("Puedes decir: hora, youtube, google, mi nombre es, modo alerta o modo normal");
    }

    else{
        hablar("No entendí el comando");
    }
}

</script>

</body>
</html>
