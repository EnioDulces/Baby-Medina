<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS SYSTEM</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap');

body{
    margin:0;
    background: radial-gradient(circle at center, #05070f, #000);
    font-family: 'Orbitron', sans-serif;
    color:#00f7ff;
    overflow:hidden;
}

/* Fondo tipo grid futurista */
.background-grid{
    position:fixed;
    width:100%;
    height:100%;
    background-image: linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
    background-size:40px 40px;
    animation: moveGrid 6s linear infinite;
    opacity:0.3;
}

@keyframes moveGrid{
    from{transform:translateY(0);}
    to{transform:translateY(40px);}
}

/* Contenedor principal */
.jarvis-panel{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:420px;
    padding:25px;
    border:1px solid rgba(0,255,255,0.3);
    border-radius:20px;
    background:rgba(0,0,0,0.6);
    box-shadow:0 0 25px rgba(0,255,255,0.3);
    backdrop-filter: blur(10px);
}

/* Título */
.title{
    text-align:center;
    font-size:22px;
    font-weight:800;
    letter-spacing:3px;
    margin-bottom:10px;
    text-shadow:0 0 15px #00f7ff;
}

/* Estado */
.status{
    text-align:center;
    font-size:14px;
    margin-bottom:15px;
    color:#0ff;
}

/* Cámara */
.video-box{
    width:100%;
    height:260px;
    border-radius:15px;
    overflow:hidden;
    border:2px solid rgba(0,255,255,0.4);
    box-shadow:0 0 20px rgba(0,255,255,0.2);
    position:relative;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Escaneo animado */
.scan-line{
    position:absolute;
    width:100%;
    height:2px;
    background:#00f7ff;
    top:0;
    animation:scan 2s linear infinite;
    opacity:0.7;
}

@keyframes scan{
    0%{top:0;}
    100%{top:100%;}
}

/* Indicador IA */
.ai-face{
    text-align:center;
    font-size:12px;
    margin-top:15px;
    opacity:0.8;
}

/* Botón estilo futurista */
.btn{
    width:100%;
    padding:10px;
    margin-top:15px;
    background:transparent;
    border:1px solid #00f7ff;
    color:#00f7ff;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
    font-family:Orbitron;
}

.btn:hover{
    background:#00f7ff;
    color:#000;
    box-shadow:0 0 15px #00f7ff;
}
</style>
</head>

<body>

<div class="background-grid"></div>

<div class="jarvis-panel">

    <div class="title">JARVIS CORE SYSTEM</div>

    <div class="status" id="status">Estado: Iniciando sistema...</div>

    <div class="video-box">
        <div class="scan-line"></div>
        <video id="video" autoplay></video>
    </div>

    <div class="ai-face" id="aiText">
        Sistema de reconocimiento activo...
    </div>

    <button class="btn" onclick="startCamera()">INICIAR SISTEMA</button>

</div>

<script>
// Cámara (solo ejemplo visual, aquí conectas tu lógica real)
function startCamera(){
    const video = document.getElementById("video");
    const status = document.getElementById("status");

    navigator.mediaDevices.getUserMedia({ video:true })
    .then(stream=>{
        video.srcObject = stream;
        status.innerText = "Estado: Sistema activo - Detectando entorno";
    })
    .catch(err=>{
        status.innerText = "Error: cámara no disponible";
    });
}
</script>

</body>
</html>
