<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>JARVIS HUD PRO</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap');

body{
    margin:0;
    background: radial-gradient(circle at center, #02060f, #000);
    color:#00f7ff;
    font-family:'Orbitron', sans-serif;
    overflow:hidden;
}

/* Fondo HUD */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
        radial-gradient(circle at 20% 30%, rgba(0,255,255,0.08), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0,150,255,0.08), transparent 40%);
    animation:bgMove 10s infinite alternate ease-in-out;
}

@keyframes bgMove{
    from{ transform:scale(1); }
    to{ transform:scale(1.1); }
}

/* CONTENEDOR */
#container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

/* NÚCLEO */
#core{
    width:220px;
    height:220px;
    border-radius:50%;
    background: radial-gradient(circle, #00f7ff, #001018 70%);
    box-shadow:
        0 0 25px #00f7ff,
        0 0 80px rgba(0,255,255,0.4),
        inset 0 0 40px rgba(255,255,255,0.1);
    margin:auto;
    position:relative;
    animation:pulse 2.5s infinite ease-in-out;
}

/* ANILLOS */
#core::before,
#core::after{
    content:"";
    position:absolute;
    border-radius:50%;
    border:1px solid rgba(0,255,255,0.25);
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

#core::before{
    width:280px;
    height:280px;
    animation:spin 8s linear infinite;
}

#core::after{
    width:340px;
    height:340px;
    animation:spinReverse 12s linear infinite;
}

/* PULSO */
@keyframes pulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.05); }
}

/* ROTACIONES */
@keyframes spin{
    from{ transform:translate(-50%,-50%) rotate(0deg); }
    to{ transform:translate(-50%,-50%) rotate(360deg); }
}

@keyframes spinReverse{
    from{ transform:translate(-50%,-50%) rotate(360deg); }
    to{ transform:translate(-50%,-50%) rotate(0deg); }
}

/* TEXTO */
#text{
    margin-top:25px;
    font-size:18px;
    letter-spacing:2px;
    opacity:0.9;
}

/* BOTONES */
button{
    margin-top:15px;
    padding:10px 18px;
    border-radius:8px;
    border:1px solid #00f7ff;
    background:transparent;
    color:#00f7ff;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#00f7ff;
    color:black;
    box-shadow:0 0 20px #00f7ff;
}

</style>
</head>

<body>

<div id="container">

    <div id="core"></div>

    <div id="text">JARVIS en espera...</div>

    <button onclick="start()">🎤 Activar voz</button>
    <button onclick="hablar('Sistema activo')">🔊 Probar voz</button>

</div>

<script>

const text = document.getElementById("text");

let recognition;

/////////////////////////
// 🔊 VOZ
/////////////////////////
function hablar(t){

    if(speechSynthesis.speaking) return;

    const msg = new SpeechSynthesisUtterance(t);
    msg.lang = "es-ES";
    msg.rate = 0.95;
    msg.pitch = 1.4;

    let voices = speechSynthesis.getVoices();
    let voice = voices.find(v => v.lang.includes("es"));

    if(voice) msg.voice = voice;

    speechSynthesis.speak(msg);
}

/////////////////////////
// 🎤 VOZ A TEXTO
/////////////////////////
function start(){

    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "es-ES";
    recognition.continuous = true;

    recognition.onresult = (event)=>{

        let cmd = event.results[event.results.length-1][0].transcript.toLowerCase();

        text.innerHTML = "Comando: " + cmd;

        ejecutar(cmd);
    };

    recognition.start();

    hablar("Sistema JARVIS activado");
}

/////////////////////////
// ⚡ COMANDOS
/////////////////////////
function ejecutar(cmd){

    if(cmd.includes("hola")){
        hablar("Hola, estoy activo");
    }

    else if(cmd.includes("hora")){
        let h = new Date().toLocaleTimeString();
        hablar("Son las " + h);
    }

    else if(cmd.includes("youtube")){
        hablar("Abriendo YouTube");
        window.open("https://youtube.com");
    }

    else if(cmd.includes("google")){
        hablar("Abriendo Google");
        window.open("https://google.com");
    }

    else if(cmd.includes("modo rojo")){
        document.body.style.background = "#200";
        document.getElementById("core").style.boxShadow = "0 0 60px red";
        hablar("Modo alerta activado");
    }

    else if(cmd.includes("modo normal")){
        document.body.style.background = "black";
        document.getElementById("core").style.boxShadow = "0 0 40px #00f7ff";
        hablar("Modo normal activado");
    }

    else if(cmd.includes("quien eres")){
        hablar("Soy JARVIS, tu asistente personal inteligente");
    }

    else if(cmd.includes("ayuda")){
        hablar("Puedes decir: hora, youtube, google, modo rojo o modo normal");
    }

    else{
        hablar("No entendí el comando");
    }
}

</script>

</body>
</html>
