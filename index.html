<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>JARVIS STARK REAL</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap');

body{
    margin:0;
    background: radial-gradient(circle at center, #020814, #000);
    font-family:'Orbitron', sans-serif;
    color:#00f7ff;
    overflow:hidden;
}

/* HUD GRID */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
        radial-gradient(circle at 20% 30%, rgba(0,255,255,0.07), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0,150,255,0.07), transparent 40%),
        repeating-linear-gradient(0deg, rgba(0,255,255,0.03), rgba(0,255,255,0.03) 1px, transparent 1px, transparent 8px);
}

/* SCAN EFFECT */
#scan{
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(transparent, rgba(0,255,255,0.15), transparent);
    animation:scan 4s linear infinite;
}

@keyframes scan{
    from{ transform:translateY(-100%); }
    to{ transform:translateY(100%); }
}

/* CENTRO */
#container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

/* CORE STARK */
#core{
    width:280px;
    height:280px;
    border-radius:50%;
    background: radial-gradient(circle at 30% 30%, #00ffff, #001018 70%);
    box-shadow:
        0 0 40px #00f7ff,
        0 0 140px rgba(0,255,255,0.4),
        inset 0 0 60px rgba(255,255,255,0.1);
    animation:pulse 2s infinite ease-in-out;
    position:relative;
}

/* ANILLOS */
#core::before,
#core::after{
    content:"";
    position:absolute;
    border-radius:50%;
    border:1px solid rgba(0,255,255,0.25);
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

#core::before{
    width:360px;
    height:360px;
    animation:spin 10s linear infinite;
}

#core::after{
    width:440px;
    height:440px;
    animation:spinReverse 14s linear infinite;
}

@keyframes pulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.06); }
}

@keyframes spin{
    from{ transform:translate(-50%,-50%) rotate(0deg); }
    to{ transform:translate(-50%,-50%) rotate(360deg); }
}

@keyframes spinReverse{
    from{ transform:translate(-50%,-50%) rotate(360deg); }
    to{ transform:translate(-50%,-50%) rotate(0deg); }
}

/* PANEL HUD */
.panel{
    position:absolute;
    top:20%;
    width:220px;
    padding:12px;
    border:1px solid rgba(0,255,255,0.2);
    background:rgba(0,0,0,0.3);
    box-shadow:0 0 25px rgba(0,255,255,0.1);
}

#left{ left:20px; }
#right{ right:20px; }

.panel h3{
    font-size:11px;
    opacity:0.6;
}

/* TEXTOS */
#text{
    margin-top:20px;
    font-size:18px;
    letter-spacing:2px;
}

#status{
    font-size:12px;
    opacity:0.6;
}
</style>
</head>

<body>

<div id="scan"></div>

<div id="left" class="panel">
    <h3>SYSTEM</h3>
    <div id="status">BOOTING</div>
</div>

<div id="right" class="panel">
    <h3>AI CORE</h3>
    <div>VOICE: ACTIVE</div>
    <div>NEURAL LINK: READY</div>
</div>

<div id="container">
    <div id="core"></div>
    <div id="text">Iniciando JARVIS...</div>
</div>

<script>

const text = document.getElementById("text");
const status = document.getElementById("status");

let recognition;
let speaking = false;
let userName = null;

/* 🔊 VOZ */
function hablar(t){

    if(speaking) return;
    speaking = true;

    const msg = new SpeechSynthesisUtterance(t);
    msg.lang = "es-ES";
    msg.rate = 0.95;
    msg.pitch = 1.3;

    let voices = speechSynthesis.getVoices();
    let voice = voices.find(v => v.lang.includes("es"));

    if(voice) msg.voice = voice;

    msg.onend = ()=> speaking = false;

    speechSynthesis.speak(msg);
}

/* 🎤 ESCUCHA */
function iniciarVoz(){

    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "es-ES";
    recognition.continuous = true;

    recognition.onresult = (e)=>{

        let cmd = e.results[e.results.length-1][0].transcript.toLowerCase();
        text.innerHTML = ">> " + cmd;

        ejecutar(cmd);
    };

    recognition.start();
}

/* 🧠 CEREBRO LOCAL + IA READY */
async function preguntarIA(mensaje){

    status.innerHTML = "THINKING...";

    /* 🔥 AQUÍ CONECTARÍAS CHATGPT / GEMINI */
    /*
    const res = await fetch("http://localhost:3000/ia", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ mensaje })
    });

    const data = await res.json();
    hablar(data.respuesta);
    */

    // fallback local
    setTimeout(()=>{
        hablar("No tengo IA conectada aún, pero puedo procesar comandos.");
        status.innerHTML = "ONLINE";
    },1000);
}

/* ⚡ CEREBRO JARVIS */
function ejecutar(cmd){

    if(cmd.includes("me llamo")){
        userName = cmd.split("me llamo")[1].trim();
        hablar("Registro completado. Hola " + userName);
        return;
    }

    if(cmd.includes("hora")){
        hablar("Son las " + new Date().toLocaleTimeString());
    }

    else if(cmd.includes("hola")){
        hablar("Hola " + (userName || "usuario"));
    }

    else if(cmd.includes("youtube")){
        window.open("https://youtube.com");
        hablar("Abriendo YouTube");
    }

    else if(cmd.includes("google")){
        window.open("https://google.com");
        hablar("Abriendo Google");
    }

    else if(cmd.includes("modo alerta")){
        document.body.style.background = "#200";
        status.innerHTML = "ALERT MODE";
        hablar("Modo alerta activado");
    }

    else{
        preguntarIA(cmd);
    }
}

/* 🚀 INICIO */
window.onload = ()=>{

    setTimeout(()=>{
        hablar("Sistema JARVIS Stark activado");
        status.innerHTML = "ONLINE";
        iniciarVoz();
    },2000);
};

</script>

</body>
</html>
