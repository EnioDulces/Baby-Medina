<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>JARVIS MOVIE LEVEL</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap');

body{
    margin:0;
    background: radial-gradient(circle at center, #01040a, #000);
    font-family:'Orbitron', sans-serif;
    color:#00f7ff;
    overflow:hidden;
}

/* HUD fondo */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
        radial-gradient(circle at 20% 30%, rgba(0,255,255,0.07), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0,150,255,0.07), transparent 40%);
    animation:move 12s infinite alternate ease-in-out;
}

@keyframes move{
    from{ transform:scale(1); }
    to{ transform:scale(1.15); }
}

/* escaneo inicial */
#scan{
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(transparent, rgba(0,255,255,0.15), transparent);
    animation:scan 3s linear infinite;
    pointer-events:none;
}

@keyframes scan{
    from{ transform:translateY(-100%); }
    to{ transform:translateY(100%); }
}

/* centro */
#container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

/* núcleo */
#core{
    width:260px;
    height:260px;
    border-radius:50%;
    background: radial-gradient(circle, #00f7ff, #001018 70%);
    box-shadow:
        0 0 40px #00f7ff,
        0 0 120px rgba(0,255,255,0.4),
        inset 0 0 40px rgba(255,255,255,0.1);
    animation:pulse 2.2s infinite ease-in-out;
    position:relative;
}

/* anillos */
#core::before,
#core::after{
    content:"";
    position:absolute;
    border-radius:50%;
    border:1px solid rgba(0,255,255,0.2);
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

#core::before{
    width:340px;
    height:340px;
    animation:spin 10s linear infinite;
}

#core::after{
    width:400px;
    height:400px;
    animation:spinReverse 14s linear infinite;
}

/* animaciones */
@keyframes pulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.06); }
}

@keyframes spin{
    from{ transform:translate(-50%,-50%) rotate(0deg); }
    to{ transform:translate(-50%,-50%) rotate(360deg); }
}

@keyframes spinReverse{
    from{ transform:translate(-50%,-50%) rotate(360deg); }
    to{ transform:translate(-50%,-50%) rotate(0deg); }
}

/* texto */
#text{
    margin-top:20px;
    font-size:18px;
    letter-spacing:2px;
    opacity:0.9;
}

#status{
    font-size:13px;
    opacity:0.6;
    margin-top:8px;
}

</style>
</head>

<body>

<div id="scan"></div>

<div id="container">

    <div id="core"></div>

    <div id="text">Inicializando JARVIS...</div>
    <div id="status">SYSTEM BOOTING</div>

</div>

<script>

const text = document.getElementById("text");
const status = document.getElementById("status");

let recognition;
let speaking = false;

// 🧠 memoria básica
let userName = null;

// 🔊 VOZ PRO
function hablar(t){

    if(speaking) return;
    speaking = true;

    const msg = new SpeechSynthesisUtterance(t);
    msg.lang = "es-ES";
    msg.rate = 0.95;
    msg.pitch = 1.35;

    let voices = speechSynthesis.getVoices();
    let voice = voices.find(v => v.lang.includes("es"));

    if(voice) msg.voice = voice;

    msg.onend = () => speaking = false;

    speechSynthesis.speak(msg);
}

// 🌅 SALUDO CINEMATOGRÁFICO
function iniciarSistema(){

    status.innerHTML = "ANALYZING USER...";

    const h = new Date().getHours();

    let saludo = "";

    if(h < 12) saludo = "Buenos días";
    else if(h < 19) saludo = "Buenas tardes";
    else saludo = "Buenas noches";

    setTimeout(()=>{
        hablar(`${saludo}. Sistema JARVIS activado.`);
    }, 1500);

    setTimeout(()=>{
        hablar("Estoy listo para asistirte. ¿Cómo te llamas?");
        status.innerHTML = "AWAITING USER INPUT";
    }, 4000);
}

// 🎤 ESCUCHA
function iniciarVoz(){

    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "es-ES";
    recognition.continuous = true;

    recognition.onresult = (e)=>{

        let cmd = e.results[e.results.length-1][0].transcript.toLowerCase();

        text.innerHTML = ">> " + cmd;

        ejecutar(cmd);
    };

    recognition.start();
}

// ⚡ CEREBRO JARVIS
function ejecutar(cmd){

    // guardar nombre
    if(cmd.includes("me llamo")){
        userName = cmd.split("me llamo")[1].trim();
        hablar(`Registro completado. Hola ${userName}`);
        return;
    }

    if(cmd.includes("quien soy")){
        hablar(userName ? `Eres ${userName}` : "Aún no has registrado tu identidad");
        return;
    }

    if(cmd.includes("hora")){
        hablar("Son las " + new Date().toLocaleTimeString());
    }

    else if(cmd.includes("youtube")){
        hablar("Abriendo YouTube");
        window.open("https://youtube.com");
    }

    else if(cmd.includes("google")){
        hablar("Abriendo Google");
        window.open("https://google.com");
    }

    else if(cmd.includes("modo alerta")){
        document.body.style.background = "#200";
        document.getElementById("core").style.boxShadow = "0 0 140px red";
        hablar("Modo alerta activado");
        status.innerHTML = "ALERT MODE";
    }

    else if(cmd.includes("modo normal")){
        document.body.style.background = "black";
        document.getElementById("core").style.boxShadow = "0 0 120px #00f7ff";
        hablar("Sistema restaurado");
        status.innerHTML = "ONLINE";
    }

    else if(cmd.includes("hola")){
        hablar("Hola, estoy aquí contigo");
    }

    else{
        hablar("Procesando... no tengo esa función aún");
    }
}

// 🚀 ARRANQUE CINEMATOGRÁFICO
window.onload = () => {

    iniciarSistema();

    setTimeout(()=>{
        iniciarVoz();
        status.innerHTML = "LISTENING";
    }, 6000);
};

</script>

</body>
</html>
