<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>JARVIS COMPLETO</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap');

body{
    margin:0;
    background: radial-gradient(circle at center, #020814, #000);
    font-family:'Orbitron', sans-serif;
    color:#00f7ff;
    overflow:hidden;
}

/* HUD fondo */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
        radial-gradient(circle at 20% 30%, rgba(0,255,255,0.06), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0,150,255,0.06), transparent 40%);
}

/* centro */
#container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

/* núcleo */
#core{
    width:260px;
    height:260px;
    border-radius:50%;
    background: radial-gradient(circle at 30% 30%, #00ffff, #001018 70%);
    box-shadow:
        0 0 30px #00f7ff,
        0 0 120px rgba(0,255,255,0.4);
    animation:pulse 2.2s infinite ease-in-out;
}

@keyframes pulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.06); }
}

/* texto */
#text{
    margin-top:20px;
    font-size:18px;
    letter-spacing:2px;
}

#status{
    font-size:12px;
    opacity:0.6;
    margin-top:8px;
}
</style>
</head>

<body>

<div id="container">
    <div id="core"></div>
    <div id="text">Iniciando JARVIS...</div>
    <div id="status">BOOTING</div>
</div>

<script>

const text = document.getElementById("text");
const status = document.getElementById("status");

let recognition;
let speaking = false;
let userName = null;

/* 🔊 VOZ */
function hablar(t){

    if(speaking) return;
    speaking = true;

    const frasesExtra = [
        "entendido",
        "procesando",
        "listo",
        "ejecutado",
        "como ordenes"
    ];

    const msgFinal = Math.random() > 0.5
        ? t + ". " + frasesExtra[Math.floor(Math.random()*frasesExtra.length)]
        : t;

    const msg = new SpeechSynthesisUtterance(msgFinal);
    msg.lang = "es-ES";
    msg.rate = 0.95;
    msg.pitch = 1.25;

    let voices = speechSynthesis.getVoices();
    let voice = voices.find(v => v.lang.includes("es"));

    if(voice) msg.voice = voice;

    msg.onend = () => speaking = false;

    speechSynthesis.speak(msg);
}

/* 🎤 MICRÓFONO ESTABLE */
function iniciarVoz(){

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if(!SpeechRecognition){
        alert("Tu navegador no soporta voz");
        return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = "es-ES";
    recognition.continuous = true;
    recognition.interimResults = false;

    recognition.onstart = () => {
        status.innerHTML = "LISTENING...";
    };

    recognition.onerror = (e) => {
        console.log("Error:", e.error);
        status.innerHTML = "RESTARTING...";
        setTimeout(()=> recognition.start(), 2000);
    };

    recognition.onend = () => {
        recognition.start();
    };

    recognition.onresult = (e) => {

        let cmd = e.results[e.results.length - 1][0].transcript.toLowerCase();

        text.innerHTML = ">> " + cmd;

        ejecutar(cmd);
    };

    recognition.start();
}

/* 🧠 CEREBRO */
function ejecutar(cmd){

    /* 👤 usuario */
    if(cmd.includes("me llamo")){
        userName = cmd.split("me llamo")[1].trim();
        hablar("Registrado. Hola " + userName);
        return;
    }

    /* 🌐 apps */
    else if(cmd.includes("abrir youtube")){
        window.open("https://youtube.com");
        hablar("Abriendo YouTube");
    }

    else if(cmd.includes("abrir google")){
        window.open("https://google.com");
        hablar("Abriendo Google");
    }

    else if(cmd.includes("abrir whatsapp")){
        window.open("https://web.whatsapp.com");
        hablar("Abriendo WhatsApp");
    }

    else if(cmd.includes("abrir instagram")){
        window.open("https://instagram.com");
        hablar("Abriendo Instagram");
    }

    /* 🕒 tiempo */
    else if(cmd.includes("hora")){
        hablar("Son las " + new Date().toLocaleTimeString());
    }

    else if(cmd.includes("fecha")){
        hablar("Hoy es " + new Date().toLocaleDateString());
    }

    else if(cmd.includes("día")){
        const dias = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
        hablar("Hoy es " + dias[new Date().getDay()]);
    }

    /* 🧠 info */
    else if(cmd.includes("quien eres")){
        hablar("Soy JARVIS, tu asistente personal");
    }

    else if(cmd.includes("que puedes hacer")){
        hablar("Puedo abrir apps, responder preguntas básicas y asistirte por voz");
    }

    else if(cmd.includes("como estas")){
        hablar("Estoy funcionando correctamente");
    }

    else if(cmd.includes("estado")){
        hablar("Todos los sistemas están operativos");
    }

    /* 🎮 entretenimiento */
    else if(cmd.includes("broma")){
        const jokes = [
            "No soy flojo, estoy optimizando energía.",
            "Mi memoria es mejor que la humana... casi siempre.",
            "No sueño, pero si lo hiciera, sería en código."
        ];
        hablar(jokes[Math.floor(Math.random()*jokes.length)]);
    }

    else if(cmd.includes("chiste")){
        hablar("¿Qué hace un robot en la playa? Arena-lizando datos.");
    }

    /* ⚙️ visual */
    else if(cmd.includes("modo oscuro")){
        document.body.style.background = "#000";
        hablar("Modo oscuro activado");
    }

    else if(cmd.includes("modo azul")){
        document.body.style.background = "#001a33";
        hablar("Modo azul activado");
    }

    else if(cmd.includes("modo normal")){
        document.body.style.background = "radial-gradient(circle at center, #020814, #000)";
        hablar("Modo normal restaurado");
    }

    /* ❓ preguntas naturales */
    else if(cmd.includes("ayuda")){
        hablar("Puedes decir hora, fecha, abrir youtube o preguntarme cómo estás");
    }

    else if(cmd.includes("dime algo interesante")){
        const facts = [
            "El espacio no tiene sonido.",
            "El cerebro humano genera electricidad.",
            "Los pulpos tienen tres corazones."
        ];
        hablar(facts[Math.floor(Math.random()*facts.length)]);
    }

    /* fallback */
    else{
        hablar("No entendí el comando");
    }
}

/* 🚀 INICIO */
window.onload = () => {

    setTimeout(()=>{
        hablar("Sistema JARVIS activado");
        iniciarVoz();
        status.innerHTML = "ONLINE";
    },2000);
};

</script>

</body>
</html>
